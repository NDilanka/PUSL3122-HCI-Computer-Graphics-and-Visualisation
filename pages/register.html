<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FurniSpace — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body class="auth-page">

  <div class="auth-split">

    <!-- Left Panel -->
    <div class="auth-brand">
      <div class="brand-content">
        <div class="brand-logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">FurniSpace</span>
        </div>
        <h1 class="brand-headline">Join the<br/>design experience.</h1>
        <p class="brand-sub">Create your account to start designing beautiful rooms with our furniture visualisation tool.</p>
        <div class="brand-features">
          <div class="feature-tag">Free to Use</div>
          <div class="feature-tag">Save Designs</div>
          <div class="feature-tag">2D &amp; 3D Views</div>
        </div>
      </div>
      <div class="brand-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-form-panel">
      <div class="auth-form-wrapper">

        <div class="form-header">
          <h2>Create account</h2>
          <p>Fill in your details to get started</p>
        </div>

        <div id="register-message" class="form-message hidden"></div>

        <form id="register-form" onsubmit="handleRegister(event)">

          <div class="form-row">
            <div class="form-group">
              <label for="fullname">Full Name</label>
              <input type="text" id="fullname" placeholder="John Smith" required/>
            </div>
            <div class="form-group">
              <label for="reg-username">Username</label>
              <input type="text" id="reg-username" placeholder="johnsmith" required/>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="john@example.com" required/>
          </div>

          <div class="form-group">
            <label for="reg-role">Account Type</label>
            <select id="reg-role" style="width:100%;padding:12px 16px;border:1.5px solid var(--warm);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--text);background:var(--white);outline:none;appearance:none;cursor:pointer;">
              <option value="user">Customer / User</option>
              <option value="admin">Designer / Admin</option>
            </select>
          </div>

          <div class="form-group">
            <label for="reg-password">Password</label>
            <div class="input-eye">
              <input type="password" id="reg-password" placeholder="Min. 6 characters" required
                     oninput="checkPasswordStrength(this.value)"/>
              <button type="button" class="eye-btn" onclick="toggleRegPassword()">👁</button>
            </div>
            <div class="password-strength">
              <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
              <span class="strength-label" id="strength-label"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Re-enter password" required/>
          </div>

          <button type="submit" class="btn-primary" id="register-btn">Create Account</button>
        </form>

        <div class="form-divider"><span>already have an account?</span></div>

        <a href="../index.html" class="btn-secondary" style="display:block;text-align:center;text-decoration:none;padding:13px;border-radius:8px;">
          Sign In Instead
        </a>

      </div>
    </div>

  </div>

  <script src="../js/auth.js"></script>
  <script>
    function toggleRegPassword() {
      const input = document.getElementById('reg-password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
