<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FurniSpace — 3D View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/designer.css"/>
  <style>
    body { margin: 0; overflow: hidden; background: #1a1a2e; }

    #three-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* Floating top bar */
    .view3d-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--warm);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 100;
    }

    .view3d-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .view3d-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Floating controls panel */
    .controls-panel {
      position: fixed;
      top: 72px;
      right: 16px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border: 1px solid var(--warm);
      border-radius: 12px;
      padding: 1rem;
      width: 220px;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(44,31,20,0.12);
    }

    .controls-panel h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-mid);
      font-weight: 600;
      margin-bottom: 0.8rem;
    }

    .ctrl-group { margin-bottom: 0.8rem; }
    .ctrl-group label {
      font-size: 0.78rem;
      color: var(--text-mid);
      display: block;
      margin-bottom: 3px;
      font-weight: 500;
    }
    .ctrl-group input[type="range"] {
      width: 100%;
      accent-color: var(--brown);
    }
    .ctrl-group input[type="color"] {
      width: 100%;
      height: 32px;
      border: 1.5px solid var(--warm);
      border-radius: 6px;
      cursor: pointer;
    }

    .ctrl-btn {
      width: 100%;
      padding: 8px;
      border: 1.5px solid var(--warm);
      background: var(--cream);
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--text);
      margin-bottom: 5px;
      transition: all 0.15s;
      text-align: center;
    }
    .ctrl-btn:hover { background: var(--brown); color: white; border-color: var(--brown); }
    .ctrl-btn.active { background: var(--brown); color: white; border-color: var(--brown); }

    /* Camera hints */
    .camera-hints {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(44,31,20,0.75);
      color: white;
      font-size: 0.78rem;
      padding: 8px 20px;
      border-radius: 20px;
      display: flex;
      gap: 16px;
      z-index: 100;
      white-space: nowrap;
    }
    .hint-item { display: flex; align-items: center; gap: 5px; opacity: 0.9; }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #2C1F14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.5s;
    }
    #loading-screen .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #C49A4A;
      margin-bottom: 1rem;
    }
    #loading-screen p { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
    .loader-bar {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 1rem;
      overflow: hidden;
    }
    .loader-fill {
      height: 100%;
      background: #C49A4A;
      border-radius: 2px;
      animation: loadAnim 1.2s ease-in-out forwards;
    }
    @keyframes loadAnim { from { width: 0% } to { width: 100% } }

    /* Selected furniture info */
    .selected-info {
      position: fixed;
      bottom: 60px;
      left: 16px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--warm);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      z-index: 100;
      min-width: 180px;
      display: none;
    }
    .selected-info.visible { display: block; }
    .selected-info h4 { font-size: 0.85rem; margin-bottom: 6px; color: var(--text); }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="logo">⬡ FurniSpace</div>
    <p>Building your 3D room...</p>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <!-- Three.js Canvas -->
  <canvas id="three-canvas"></canvas>

  <!-- Top Bar -->
  <div class="view3d-topbar">
    <div class="view3d-title">
      <span>⬡</span> FurniSpace — 3D View
    </div>
    <div class="view3d-controls">
      <button class="tool-btn" onclick="setCameraView('perspective')">👁 Perspective</button>
      <button class="tool-btn" onclick="setCameraView('top')">⬆ Top View</button>
      <button class="tool-btn" onclick="setCameraView('front')">⬛ Front View</button>
      <button class="tool-btn" onclick="resetCamera()">⊙ Reset Camera</button>
      <button class="btn-save" onclick="window.location.href='designer.html'">← Back to 2D</button>
    </div>
  </div>

  <!-- Controls Panel -->
  <div class="controls-panel">
    <h3>🌟 Lighting</h3>

    <div class="ctrl-group">
      <label>Ambient Light: <span id="ambient-val">60</span>%</label>
      <input type="range" id="ambient-light" min="0" max="100" value="60"
             oninput="updateLighting()"/>
    </div>

    <div class="ctrl-group">
      <label>Sun Intensity: <span id="sun-val">80</span>%</label>
      <input type="range" id="sun-light" min="0" max="100" value="80"
             oninput="updateLighting()"/>
    </div>

    <div class="ctrl-group">
      <label>Light Colour</label>
      <input type="color" id="light-color" value="#ffffff"
             onchange="updateLighting()"/>
    </div>

    <hr style="border:none;border-top:1px solid var(--warm);margin:0.8rem 0"/>

    <h3>🏠 Room</h3>

    <div class="ctrl-group">
      <label>Wall Colour</label>
      <input type="color" id="wall-color-3d" value="#F5F0E8"
             onchange="updateRoomColors()"/>
    </div>

    <div class="ctrl-group">
      <label>Floor Colour</label>
      <input type="color" id="floor-color-3d" value="#D4A96A"
             onchange="updateRoomColors()"/>
    </div>

    <hr style="border:none;border-top:1px solid var(--warm);margin:0.8rem 0"/>

    <h3>📷 Camera</h3>
    <button class="ctrl-btn" onclick="setCameraView('perspective')">Perspective</button>
    <button class="ctrl-btn" onclick="setCameraView('top')">Top Down</button>
    <button class="ctrl-btn" onclick="setCameraView('front')">Front View</button>
    <button class="ctrl-btn" onclick="setCameraView('corner')">Corner View</button>

    <hr style="border:none;border-top:1px solid var(--warm);margin:0.8rem 0"/>

    <h3>✨ Effects</h3>
    <button class="ctrl-btn" id="shadow-btn" onclick="toggleShadows()">Shadows: ON</button>
    <button class="ctrl-btn" id="grid-btn"   onclick="toggleGrid()">Grid: ON</button>
  </div>

  <!-- Selected Furniture Info -->
  <div class="selected-info" id="selected-info">
    <h4 id="selected-name">Sofa</h4>
    <div style="font-size:0.78rem;color:var(--text-mid)">
      Click and drag to move<br/>
      Double-click to rotate
    </div>
  </div>

  <!-- Camera Hints -->
  <div class="camera-hints">
    <div class="hint-item">🖱 Left drag: Rotate</div>
    <div class="hint-item">🖱 Right drag: Pan</div>
    <div class="hint-item">🖱 Scroll: Zoom</div>
    <div class="hint-item">Click: Select item</div>
  </div>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script src="../js/auth.js"></script>
  <script src="../js/savedesign.js"></script>
  <script src="../js/room3d.js"></script>

</body>
</html>
